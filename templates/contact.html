{% include "header.html" %}

<!-- Page Header -->
<header class="hero-header"
  style="background-image: url('{{ url_for('static', filename='img/contact-bg.jpg') }}'); background-size: cover; background-position: center; color: white; position: relative;">
  <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5);"></div>
  <div class="container" style="position: relative; z-index: 1;">
    <h1 class="hero-title" style="color: white; -webkit-text-fill-color: white;">Contact Me</h1>
    <p class="hero-subtitle" style="color: rgba(255,255,255,0.9);">Have questions? I have answers.</p>
  </div>
</header>

<!-- Main Content -->
<div class="container">
  <div class="post-body">
    <p>Want to get in touch? Fill out the form below to send me a message and I will get back to you as soon as
      possible!</p>

    {% if confirm: %}
    <div class="alert alert-success" role="alert"
      style="padding: 1rem; background-color: #dcfce7; color: #166534; border-radius: 8px; margin-bottom: 2rem;">
      Message sent successfully!
    </div>
    {% endif %}

    <form name="sentMessage" id="contactForm" action="{{ url_for('contact') }}" method="post" novalidate>
      <div class="control-group">
        <div class="form-group floating-label-form-group controls">
          <label>Name</label>
          <input type="text" class="form-control" placeholder="Name" id="name" name="name" required
            data-validation-required-message="Please enter your name.">
          <p class="help-block text-danger"></p>
        </div>
      </div>
      <div class="control-group">
        <div class="form-group floating-label-form-group controls">
          <label>Email Address</label>
          <input type="email" class="form-control" placeholder="Email Address" id="email" name="email" required
            data-validation-required-message="Please enter your email address.">
          <p class="help-block text-danger"></p>
        </div>
      </div>
      <div class="control-group">
        <div class="form-group col-xs-12 floating-label-form-group controls">
          <label>Phone Number</label>
          <input type="tel" class="form-control" placeholder="Phone Number" id="phone" name="phone" required
            data-validation-required-message="Please enter your phone number.">
          <p class="help-block text-danger"></p>
        </div>
      </div>
      <div class="control-group">
        <div class="form-group floating-label-form-group controls">
          <label>Message</label>
          <textarea rows="5" class="form-control" placeholder="Message" id="message" name="message" required
            data-validation-required-message="Please enter a message."></textarea>
          <p class="help-block text-danger"></p>
        </div>
      </div>
      <br>
      <div id="success"></div>
      <button type="submit" class="btn btn-primary" id="sendMessageButton">Send</button>
    </form>
  </div>
</div>

{% include "footer.html" %}
