{% include "header.html" %}

<!-- Main Content -->
<div class="container">
  <div class="post-grid">
    {% for post in all_posts %}
    <article class="post-card">
      <img class="post-image" src="{{ post.img_url }}" alt="{{ post.title }}">
      <div class="post-content">
        <h2 class="post-title">
          <a href="{{ url_for('show_post', post_id=post.id) }}">{{ post.title }}</a>
        </h2>
        <h3 class="post-subtitle">{{ post.subtitle }}</h3>
        <div class="post-meta">
          <span>Posted by {{ post.author.name }}</span>
          <span>{{ post.date }}</span>
        </div>
        {% if current_user.id == 1: %}
        <div class="admin-actions" style="margin-top: 1rem;">
          <a href="{{ url_for('delete_post', post_id=post.id) }}" class="btn-delete">✘</a>
        </div>
        {% endif %}
      </div>
    </article>
    {% endfor %}
  </div>

  <!-- Pager -->
  <div class="clearfix" style="text-align: center; margin-bottom: 4rem;">
    <a class="btn btn-primary" href="#">Older Posts &rarr;</a>
  </div>
</div>

{% include "footer.html" %}
